name: Deploy CV to GitHub Pages

on:
  push:
    branches: ["main"] # Vérifie bien si ta branche s'appelle main ou master

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      
      - name: Setup Pages
        uses: actions/configure-pages@v5
        
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: '.' # Déploie le dossier racine contenant ton index.html
          
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
