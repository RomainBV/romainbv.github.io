name: Deploy CV to GitHub Pages

on:
  push:
    branches: ["main"] # Remplace par "master" si ta branche principale s'appelle master

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps:https://github.com/google/gemini-cookbook/actions/runs/13600618037/job/38025252814?pr=615#step:1:1 }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4 # Les versions v4/v5 intégrées par GitHub directement ici fonctionneront nativement
      
      - name: Setup Pages
        uses: actions/configure-pages@v5
        
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: '.' # Déploie tout le dossier (ton fichier index.html)
          
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
